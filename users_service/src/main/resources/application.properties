spring.application.name=${SPRING_APPLICATION_NAME}
server.port=${SERVER_PORT}

# MongoDB configuration
spring.mongodb.uri=${SPRING_MONGODB_URI}

# API CONFIGURATION
user.can-delete-own-account=${USER_CAN_DELETE_OWN_ACCOUNT}
user.username.min-length=${USER_USERNAME_MIN_LENGTH}
user.username.max-length=${USER_USERNAME_MAX_LENGTH}
user.password.min-length=${USER_PASSWORD_MIN_LENGTH}
user.password.max-length=${USER_PASSWORD_MAX_LENGTH}
user.password.has-uppercase=${USER_PASSWORD_HAS_UPPERCASE}
user.password.has-lowercase=${USER_PASSWORD_HAS_LOWERCASE}
user.password.has-digit=${USER_PASSWORD_HAS_DIGIT}
user.password.has-special=${USER_PASSWORD_HAS_SPECIAL}
user.password.special-chars=${USER_PASSWORD_SPECIAL_CHARS}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

roles.base-username=${ROLES_BASE_USERNAME}
roles.base-password=${ROLES_BASE_PASSWORD}
roles.base-email=${ROLES_BASE_EMAIL}

# Roles

roles.allowed=${ROLES_ALLOWED}
roles.base-role=${ROLES_BASE_ROLE}

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Verification
verification.base-url=${VERIFICATION_BASE_URL}